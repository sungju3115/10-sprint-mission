spring:
  application:
    name: discodeit

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
discodeit:
  storage:
    type: local
    local:
      root-path: ./data/uploads
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  # 아래 설정은 스웨거 화면이 잘 나오게 도와줍니다
    display-request-duration: true
    groups-order: DESC
    default-consumes-media-type: multipart/form-data
  # 특정 패키지만 스캔하고 싶다면 아래 주석을 풀고 '정확한' 경로를 입력하세요.
  # packages-to-scan: com.sprint.mission.discodeit.controller
  logging:
    level:
      org.springdoc: DEBUG
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE