spring:
  application:
    name: discodeit
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    groups-order: DESC
    default-consumes-media-type: multipart/form-data

discodeit:
  storage:
    type: local
    local:
      root-path: ./data/uploads

logging:
  level:
    root: INFO
